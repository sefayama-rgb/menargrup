<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menar Grup — Görevler Analitik</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --blue:#58a6ff;--blue-dim:rgba(88,166,255,0.1);
  --green:#3fb950;--green-dim:rgba(63,185,80,0.1);
  --red:#f85149;--red-dim:rgba(248,81,73,0.1);
  --amber:#d29922;--amber-dim:rgba(210,153,34,0.1);
  --purple:#bc8cff;--purple-dim:rgba(188,140,255,0.1);
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
.sidebar{position:fixed;top:0;left:0;width:200px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;z-index:10;}
.logo{padding:0 16px 16px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.logo-title{font-size:12px;font-weight:600;letter-spacing:.5px;}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--green-dim);color:var(--green);}
.nav-item svg{width:14px;height:14px;flex-shrink:0;}
.main{margin-left:200px;padding:24px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.topbar h1{font-size:16px;font-weight:600;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;font-family:var(--font);cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s;}
.btn:hover{background:var(--bg4);color:var(--text);}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden;}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.c-blue::after{background:var(--blue);}
.card.c-amber::after{background:var(--amber);}
.card.c-green::after{background:var(--green);}
.card.c-purple::after{background:var(--purple);}
.card.c-red::after{background:var(--red);}
.card-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-family:var(--mono);margin-bottom:6px;}
.card-value{font-size:24px;font-weight:600;font-family:var(--mono);}
.card.c-blue .card-value{color:var(--blue);}
.card.c-amber .card-value{color:var(--amber);}
.card.c-green .card-value{color:var(--green);}
.card.c-purple .card-value{color:var(--purple);}
.card.c-red .card-value{color:var(--red);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.sec-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sec-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.sec-title svg{width:13px;height:13px;color:var(--green);}
.badge{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:99px;background:var(--green-dim);color:var(--green);}
.chart-wrap{padding:16px;}
canvas{max-height:200px;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:8px 16px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.row:hover td{background:var(--bg3);cursor:pointer;}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;font-family:var(--mono);background:var(--bg4);color:var(--text2);}
.nc{display:flex;align-items:center;gap:8px;}
.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;font-family:var(--mono);padding:2px 7px;border-radius:4px;}
.sbadge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;}
.s-wait{background:var(--amber-dim);color:var(--amber);}
.s-prog{background:var(--green-dim);color:var(--green);}
.s-done{background:var(--purple-dim);color:var(--purple);}
.s-late{background:var(--red-dim);color:var(--red);}
.bar-wrap{display:flex;align-items:center;gap:6px;}
.bar-track{height:4px;border-radius:2px;background:var(--bg4);flex:1;min-width:40px;}
.bar-fill{height:100%;border-radius:2px;background:var(--green);}
.state{text-align:center;padding:40px;color:var(--text3);font-size:12px;}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo"><div class="logo-title">MENAR GRUP</div><div class="logo-sub">Görevler Analitik</div></div>
  <div class="nav">
    <button class="nav-item active" onclick="showTab('overview')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Genel Bakış
    </button>
    <button class="nav-item" onclick="showTab('tasks')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Görev Listesi
    </button>
    <button class="nav-item" onclick="showTab('perf')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Çalışan Bazında
    </button>
    <button class="nav-item" onclick="window.open('https://menar.bitrix24.com.tr','_blank')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Bitrix24
    </button>
  </div>
</nav>

<main class="main">
  <div class="topbar">
    <h1 id="page-title">Genel Bakış</h1>
    <button class="btn" onclick="loadAll()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Yenile</button>
  </div>

  <div class="metrics">
    <div class="card c-blue"><div class="card-label">Toplam</div><div class="card-value" id="m-total">—</div></div>
    <div class="card c-amber"><div class="card-label">Bekliyor</div><div class="card-value" id="m-wait">—</div></div>
    <div class="card c-green"><div class="card-label">Devam Ediyor</div><div class="card-value" id="m-prog">—</div></div>
    <div class="card c-purple"><div class="card-label">Tamamlandı</div><div class="card-value" id="m-done">—</div></div>
    <div class="card c-red"><div class="card-label">Gecikmiş</div><div class="card-value" id="m-late">—</div></div>
  </div>

  <div id="tab-overview">
    <div class="grid2">
      <div class="section">
        <div class="sec-head"><span class="sec-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>Durum Dağılımı</span></div>
        <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
      </div>
      <div class="section">
        <div class="sec-head"><span class="sec-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Çalışan Yükü</span></div>
        <div class="chart-wrap"><canvas id="perfChart"></canvas></div>
      </div>
    </div>
    <div class="section">
      <div class="sec-head"><span class="sec-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Gecikmiş Görevler <span class="badge" id="late-count">0</span></span></div>
      <div id="late-table"><div class="state">Yükleniyor...</div></div>
    </div>
  </div>

  <div id="tab-tasks" style="display:none;">
    <div class="section">
      <div class="sec-head">
        <span class="sec-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg>Tüm Görevler <span class="badge" id="task-count">0</span></span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;" id="task-filters">
          <button onclick="setFilter('ALL',this)" style="font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid transparent;background:var(--green-dim);color:var(--green);cursor:pointer;">Tümü</button>
          <button onclick="setFilter('WAIT',this)" style="font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;">Bekliyor</button>
          <button onclick="setFilter('PROG',this)" style="font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;">Devam Ediyor</button>
          <button onclick="setFilter('DONE',this)" style="font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;">Tamamlandı</button>
          <button onclick="setFilter('LATE',this)" style="font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;">Gecikmiş</button>
        </div>
      </div>
      <div id="tasks-table"><div class="state">Yükleniyor...</div></div>
      <div id="task-pag" style="display:none;padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span id="task-pag-info" style="font-size:11px;color:var(--text3);font-family:var(--mono);"></span>
        <div id="task-pag-btns" style="display:flex;gap:3px;"></div>
      </div>
    </div>
  </div>

  <div id="tab-perf" style="display:none;">
    <div class="section">
      <div class="sec-head"><span class="sec-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Çalışan Bazında Görev Dağılımı</span></div>
      <div id="perf-table"><div class="state">Yükleniyor...</div></div>
    </div>
  </div>
</main>

<script>
const WH='https://menar.bitrix24.com.tr/rest/1/logbyyxzick7ujw6/';
const PORTAL='https://menar.bitrix24.com.tr';
let allTasks=[], umap={};
let taskFilter='ALL', taskPage=1;
const PAGE=20;

function qs(params,start){
  const p=[];
  if(start!==undefined) p.push('start='+start);
  for(const[k,v] of Object.entries(params)){
    if(Array.isArray(v)) v.forEach(x=>p.push(encodeURIComponent(k+'[]')+'='+encodeURIComponent(x)));
    else if(v&&typeof v==='object') Object.entries(v).forEach(([sk,sv])=>p.push(encodeURIComponent(k+'['+sk+']')+'='+encodeURIComponent(sv)));
    else p.push(encodeURIComponent(k)+'='+encodeURIComponent(v));
  }
  return p.join('&');
}
async function bx(method,params={},start){
  const r=await fetch(WH+method+'.json?'+qs(params,start));
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error_description||d.error);
  return d;
}
async function fetchAllTasks(){
  let start=0,all=[];
  while(true){
    const d=await bx('tasks.task.list',{select:['ID','TITLE','STATUS','RESPONSIBLE_ID','DEADLINE','CREATED_DATE','GROUP_ID']},start);
    const items=Array.isArray(d.result)?d.result:(d.result.tasks||[]);
    all=all.concat(items);
    if(!d.next||all.length>=3000) break;
    start=d.next;
  }
  return all;
}

function ini(n){return(n||'?').split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?';}
function isLate(t){return t.status!=='5'&&t.deadline&&new Date(t.deadline)<new Date();}
function badge(t){
  if(t.status==='5') return '<span class="sbadge s-done">Tamamlandı</span>';
  if(isLate(t)) return '<span class="sbadge s-late">Gecikmiş</span>';
  if(t.status==='3') return '<span class="sbadge s-prog">Devam Ediyor</span>';
  return '<span class="sbadge s-wait">Bekliyor</span>';
}

function showTab(t){
  ['overview','tasks','perf'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'':'none');
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',['overview','tasks','perf'][i]===t));
  document.getElementById('page-title').textContent={overview:'Genel Bakış',tasks:'Görev Listesi',perf:'Çalışan Bazında'}[t]||t;
}

let stChart,pfChart;
function makeCharts(tasks){
  let wait=0,prog=0,done=0,late=0;
  tasks.forEach(t=>{
    if(t.status==='5') done++;
    else if(isLate(t)) late++;
    else if(t.status==='3') prog++;
    else wait++;
  });
  const stCtx=document.getElementById('statusChart').getContext('2d');
  if(stChart) stChart.destroy();
  stChart=new Chart(stCtx,{type:'doughnut',data:{labels:['Bekliyor','Devam Ediyor','Tamamlandı','Gecikmiş'],datasets:[{data:[wait,prog,done,late],backgroundColor:['#d29922','#3fb950','#bc8cff','#f85149'],borderWidth:0,hoverOffset:4}]},options:{plugins:{legend:{position:'bottom',labels:{color:'#8b949e',font:{size:10},boxWidth:10}}},responsive:true,maintainAspectRatio:true}});

  // Perf chart
  const pm={};
  tasks.forEach(t=>{const uid=t.responsibleId;if(!uid)return;if(!pm[uid])pm[uid]={name:umap[uid]||'#'+uid,total:0};pm[uid].total++;});
  const top=Object.values(pm).sort((a,b)=>b.total-a.total).slice(0,8);
  const pfCtx=document.getElementById('perfChart').getContext('2d');
  if(pfChart) pfChart.destroy();
  pfChart=new Chart(pfCtx,{type:'bar',data:{labels:top.map(u=>u.name.split(' ')[0]),datasets:[{data:top.map(u=>u.total),backgroundColor:'rgba(63,185,80,0.7)',borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{size:10}}},y:{ticks:{color:'#8b949e',font:{size:10}}}},responsive:true,maintainAspectRatio:true}});
}

function renderLate(tasks){
  const late=tasks.filter(isLate).sort((a,b)=>new Date(a.DEADLINE)-new Date(b.DEADLINE));
  document.getElementById('late-count').textContent=late.length;
  if(!late.length){document.getElementById('late-table').innerHTML='<div class="state">Gecikmiş görev yok 🎉</div>';return;}
  let h='<table><thead><tr><th>Görev</th><th>Sorumlu</th><th>Son Tarih</th><th>Gün Geçti</th></tr></thead><tbody>';
  for(const t of late.slice(0,20)){
    const days=Math.floor((new Date()-new Date(t.deadline))/(1000*60*60*24));
    const url=PORTAL+'/company/personal/user/'+t.responsibleId+'/tasks/task/view/'+t.ID+'/';
    h+=`<tr class="row" onclick="window.open('${url}','_blank')">
      <td style="font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title||'—'}</td>
      <td><div class="nc"><span class="av">${ini(umap[t.responsibleId]||'?')}</span><span style="color:var(--text2)">${umap[t.responsibleId]||'#'+t.responsibleId}</span></div></td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--red)">${t.deadline.slice(0,10)}</td>
      <td style="font-family:var(--mono);color:var(--red);font-weight:600">${days} gün</td>
    </tr>`;
  }
  h+='</tbody></table>';
  document.getElementById('late-table').innerHTML=h;
}

function setFilter(f,btn){
  taskFilter=f; taskPage=1;
  document.querySelectorAll('#task-filters button').forEach(b=>{b.style.background='transparent';b.style.color='var(--text2)';b.style.borderColor='var(--border)';});
  btn.style.background='var(--green-dim)'; btn.style.color='var(--green)'; btn.style.borderColor='transparent';
  renderTaskList();
}
function getFiltered(){
  return allTasks.filter(t=>{
    if(taskFilter==='ALL') return true;
    if(taskFilter==='WAIT') return t.status!=='5'&&!isLate(t)&&t.status!=='3';
    if(taskFilter==='PROG') return t.status==='3'&&!isLate(t);
    if(taskFilter==='DONE') return t.status==='5';
    if(taskFilter==='LATE') return isLate(t);
    return true;
  });
}
function renderTaskList(){
  const f=getFiltered();
  const pages=Math.max(1,Math.ceil(f.length/PAGE));
  if(taskPage>pages) taskPage=1;
  const slice=f.slice((taskPage-1)*PAGE,taskPage*PAGE);
  document.getElementById('task-count').textContent=f.length;
  if(!slice.length){document.getElementById('tasks-table').innerHTML='<div class="state">Görev bulunamadı.</div>';return;}
  let h='<table><thead><tr><th>Görev</th><th>Sorumlu</th><th>Durum</th><th>Son Tarih</th></tr></thead><tbody>';
  for(const t of slice){
    const url=PORTAL+'/company/personal/user/'+t.responsibleId+'/tasks/task/view/'+t.ID+'/';
    const dl=t.deadline?t.deadline.slice(0,10):'—';
    h+=`<tr class="row" onclick="window.open('${url}','_blank')">
      <td style="font-weight:500;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title||'—'}</td>
      <td><div class="nc"><span class="av">${ini(umap[t.responsibleId]||'?')}</span><span style="color:var(--text2)">${umap[t.responsibleId]||'#'+t.responsibleId}</span></div></td>
      <td>${badge(t)}</td>
      <td style="font-family:var(--mono);font-size:11px;color:${isLate(t)?'var(--red)':'var(--text3)'}">${dl}</td>
    </tr>`;
  }
  h+='</tbody></table>';
  document.getElementById('tasks-table').innerHTML=h;
  const pag=document.getElementById('task-pag');
  if(pages>1){
    pag.style.display='flex';
    document.getElementById('task-pag-info').textContent=`${(taskPage-1)*PAGE+1}–${Math.min(taskPage*PAGE,f.length)} / ${f.length}`;
    let btns='';
    const s=Math.max(1,taskPage-3),e=Math.min(pages,s+6);
    for(let i=s;i<=e;i++) btns+=`<button onclick="goTask(${i})" style="width:26px;height:26px;border-radius:4px;border:1px solid ${i===taskPage?'transparent':'var(--border)'};background:${i===taskPage?'var(--green-dim)':'transparent'};color:${i===taskPage?'var(--green)':'var(--text2)'};cursor:pointer;font-size:11px">${i}</button>`;
    document.getElementById('task-pag-btns').innerHTML=btns;
  } else { pag.style.display='none'; }
}
function goTask(p){taskPage=p;renderTaskList();}

function renderPerf(){
  const pm={};
  allTasks.forEach(t=>{
    const uid=t.responsibleId; if(!uid) return;
    if(!pm[uid]) pm[uid]={name:umap[uid]||'#'+uid,total:0,wait:0,prog:0,done:0,late:0};
    pm[uid].total++;
    if(t.status==='5') pm[uid].done++;
    else if(isLate(t)) pm[uid].late++;
    else if(t.status==='3') pm[uid].prog++;
    else pm[uid].wait++;
  });
  const rows=Object.values(pm).sort((a,b)=>b.total-a.total);
  const max=rows[0]?.total||1;
  let h='<table><thead><tr><th>Çalışan</th><th>Toplam</th><th>Bekliyor</th><th>Devam</th><th>Tamamlandı</th><th>Gecikmiş</th><th>Tamamlanma %</th><th>Dağılım</th></tr></thead><tbody>';
  for(const u of rows){
    const pct=u.total?Math.round(u.done/u.total*100):0;
    const bw=Math.round(u.total/max*100);
    h+=`<tr><td><div class="nc"><span class="av">${ini(u.name)}</span><span>${u.name}</span></div></td>
      <td style="font-family:var(--mono);font-weight:600">${u.total}</td>
      <td style="color:var(--amber);font-family:var(--mono)">${u.wait}</td>
      <td style="color:var(--green);font-family:var(--mono)">${u.prog}</td>
      <td style="color:var(--purple);font-family:var(--mono)">${u.done}</td>
      <td style="color:var(--red);font-family:var(--mono)">${u.late}</td>
      <td style="color:var(--blue);font-family:var(--mono)">${pct}%</td>
      <td><div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${bw}%"></div></div></div></td>
    </tr>`;
  }
  h+='</tbody></table>';
  document.getElementById('perf-table').innerHTML=h;
}

async function loadAll(){
  try{
    const[tasks,users]=await Promise.all([
      fetchAllTasks(),
      bx('user.get',{ACTIVE:'Y'})
    ]);
    umap={};
    users.result.forEach(u=>umap[u.ID]=[u.NAME,u.LAST_NAME].filter(Boolean).join(' '));
    allTasks=tasks;

    let wait=0,prog=0,done=0,late=0;
    tasks.forEach(t=>{
      if(t.status==='5') done++;
      else if(isLate(t)) late++;
      else if(t.status==='3') prog++;
      else wait++;
    });
    document.getElementById('m-total').textContent=tasks.length.toLocaleString('tr');
    document.getElementById('m-wait').textContent=wait.toLocaleString('tr');
    document.getElementById('m-prog').textContent=prog.toLocaleString('tr');
    document.getElementById('m-done').textContent=done.toLocaleString('tr');
    document.getElementById('m-late').textContent=late.toLocaleString('tr');

    makeCharts(tasks);
    renderLate(tasks);
    renderTaskList();
    renderPerf();
  }catch(e){
    document.getElementById('late-table').innerHTML=`<div class="state" style="color:var(--red)">Hata: ${e.message}</div>`;
  }
}
loadAll();
</script>
</body>
</html>
