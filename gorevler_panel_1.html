<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menar Grup — Görevler Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --bg4: #252d40;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #e8eaf0; --text2: #8891a8; --text3: #535f7a;
  --blue: #4d90f0; --blue-dim: rgba(77,144,240,0.12);
  --green: #3ecf8e; --green-dim: rgba(62,207,142,0.12);
  --red: #f06060; --red-dim: rgba(240,96,96,0.12);
  --amber: #f0b84d; --amber-dim: rgba(240,184,77,0.12);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
  --font: 'IBM Plex Sans', sans-serif; --mono: 'IBM Plex Mono', monospace;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; min-height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 0; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; gap: 4px; }
.sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.sidebar-logo .company { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.5px; }
.sidebar-logo .sub { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 20px; font-size: 13px; color: var(--text2); cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; }
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active { color: var(--green); border-left-color: var(--green); background: var(--green-dim); }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.main { margin-left: 220px; padding: 32px; flex: 1; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.topbar h1 { font-size: 20px; font-weight: 600; }
.topbar-right { display: flex; gap: 10px; align-items: center; }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); pointer-events: none; }
.search { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 13px; padding: 7px 12px 7px 32px; border-radius: 8px; width: 220px; outline: none; transition: border 0.15s; }
.search:focus { border-color: var(--green); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-family: var(--font); font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); }
.btn:hover { background: var(--bg4); color: var(--text); }
.btn svg { width: 14px; height: 14px; }
.metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; position: relative; overflow: hidden; }
.metric::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.metric.m-total::before { background: var(--blue); }
.metric.m-new::before { background: var(--amber); }
.metric.m-progress::before { background: var(--green); }
.metric.m-done::before { background: var(--purple); }
.metric.m-expired::before { background: var(--red); }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; font-family: var(--mono); }
.metric-value { font-size: 28px; font-weight: 600; font-family: var(--mono); }
.metric.m-total .metric-value { color: var(--blue); }
.metric.m-new .metric-value { color: var(--amber); }
.metric.m-progress .metric-value { color: var(--green); }
.metric.m-done .metric-value { color: var(--purple); }
.metric.m-expired .metric-value { color: var(--red); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.section { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.section-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.section-title svg { width: 15px; height: 15px; color: var(--green); }
.count-badge { font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 99px; background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
.filters { display: flex; gap: 6px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-tab { font-size: 12px; font-family: var(--font); font-weight: 500; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.filter-tab:hover { color: var(--text); background: var(--bg3); }
.filter-tab.active { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.25); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { font-size: 11px; font-family: var(--mono); font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; padding: 10px 20px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody td { padding: 11px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr.clickable { cursor: pointer; transition: background 0.1s; }
tbody tr.clickable:hover td { background: var(--bg3); }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; font-family: var(--mono); background: var(--bg4); color: var(--text2); flex-shrink: 0; }
.name-cell { display: flex; align-items: center; gap: 10px; }
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; font-family: var(--mono); padding: 3px 9px; border-radius: 5px; white-space: nowrap; }
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.badge-new { background: var(--amber-dim); color: var(--amber); }
.badge-progress { background: var(--green-dim); color: var(--green); }
.badge-done { background: var(--purple-dim); color: var(--purple); }
.badge-expired { background: var(--red-dim); color: var(--red); }
.perf-bar { display: flex; align-items: center; gap: 8px; }
.perf-bar-track { height: 5px; border-radius: 3px; background: var(--bg4); flex: 1; min-width: 60px; }
.perf-bar-fill { height: 100%; border-radius: 3px; background: var(--green); }
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-top: 1px solid var(--border); }
.page-info { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.page-btns { display: flex; gap: 4px; }
.page-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-family: var(--mono); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
.page-btn:hover { background: var(--bg3); }
.page-btn.active { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.3); }
.state-box { text-align: center; padding: 48px 20px; }
.state-box p { font-size: 13px; color: var(--text3); }
.state-error { color: var(--red); }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
.loading-anim svg { animation: pulse 1.2s ease-in-out infinite; width:24px; height:24px; margin-bottom:12px; opacity:0.4; }
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="company">MENAR GRUP</div>
      <div class="sub">Görevler Paneli</div>
    </div>
    <div class="nav-item active" onclick="showView('tasks')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Görevler
    </div>
    <div class="nav-item" onclick="showView('perf')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Çalışan Bazında
    </div>
    <div class="nav-item" onclick="window.open('https://menar.bitrix24.com.tr','_blank')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Bitrix24'e Git
    </div>
  </nav>

  <main class="main">
    <div class="topbar">
      <h1 id="page-title">Görevler</h1>
      <div class="topbar-right">
        <div class="search-wrap" id="search-wrap">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search" type="text" id="searchInput" placeholder="Görev ara..." oninput="filterTasks()">
        </div>
        <button class="btn" onclick="loadData()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Yenile
        </button>
      </div>
    </div>

    <div class="metrics">
      <div class="metric m-total"><div class="metric-label">Toplam</div><div class="metric-value" id="m-total">—</div></div>
      <div class="metric m-new"><div class="metric-label">Bekliyor</div><div class="metric-value" id="m-new">—</div></div>
      <div class="metric m-progress"><div class="metric-label">Devam Ediyor</div><div class="metric-value" id="m-progress">—</div></div>
      <div class="metric m-done"><div class="metric-label">Tamamlandı</div><div class="metric-value" id="m-done">—</div></div>
      <div class="metric m-expired"><div class="metric-label">Gecikmiş</div><div class="metric-value" id="m-expired">—</div></div>
    </div>

    <!-- Tasks view -->
    <div id="view-tasks">
      <div class="section">
        <div class="section-head">
          <span class="section-title">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Görevler <span class="count-badge" id="task-count">0</span>
          </span>
        </div>
        <div class="filters">
          <button class="filter-tab active" onclick="setFilter('ALL',this)">Tümü</button>
          <button class="filter-tab" onclick="setFilter('2',this)">Bekliyor</button>
          <button class="filter-tab" onclick="setFilter('3',this)">Devam Ediyor</button>
          <button class="filter-tab" onclick="setFilter('5',this)">Tamamlandı</button>
          <button class="filter-tab" onclick="setFilter('EXPIRED',this)">Gecikmiş</button>
        </div>
        <div class="tbl-wrap" id="tasks-table">
          <div class="state-box loading-anim"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><p>Yükleniyor...</p></div>
        </div>
        <div class="pagination" id="pagination" style="display:none;">
          <span class="page-info" id="page-info"></span>
          <div class="page-btns" id="page-btns"></div>
        </div>
      </div>
    </div>

    <!-- Perf view -->
    <div id="view-perf" style="display:none;">
      <div class="section">
        <div class="section-head">
          <span class="section-title">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Çalışan Bazında Görev Dağılımı
          </span>
        </div>
        <div class="tbl-wrap" id="perf-table">
          <div class="state-box loading-anim"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><p>Yükleniyor...</p></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const WEBHOOK = 'https://menar.bitrix24.com.tr/rest/1/logbyyxzick7ujw6/';
const PORTAL  = 'https://menar.bitrix24.com.tr';
let allTasks = [];
let userMap  = {};
let currentFilter = 'ALL';
let currentPage   = 1;
const PAGE_SIZE   = 20;

function buildQS(params, start) {
  const parts = [];
  if(start !== undefined) parts.push('start='+start);
  for(const [k,v] of Object.entries(params)){
    if(Array.isArray(v)) v.forEach(x => parts.push(encodeURIComponent(k+'[]')+'='+encodeURIComponent(x)));
    else if(v !== null && typeof v === 'object') { for(const [sk,sv] of Object.entries(v)) parts.push(encodeURIComponent(k+'['+sk+']')+'='+encodeURIComponent(sv)); }
    else parts.push(encodeURIComponent(k)+'='+encodeURIComponent(v));
  }
  return parts.join('&');
}

async function bxCall(method, params={}, start) {
  const url = WEBHOOK+method+'.json?'+buildQS(params, start);
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  if(d.error) throw new Error(d.error_description||d.error);
  return d;
}

async function fetchAll(method, params={}) {
  let start=0, all=[];
  while(true){
    const d = await bxCall(method, params, start);
    // tasks.task.list returns result.tasks, others return result directly
    const items = Array.isArray(d.result) ? d.result : (d.result.tasks || Object.values(d.result));
    all = all.concat(items);
    if(!d.next || all.length>=2000) break;
    start = d.next;
  }
  return all;
}

function initials(n){ return (n||'?').split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?'; }

function statusBadge(s, deadline) {
  const now = new Date();
  const dl = deadline ? new Date(deadline) : null;
  if(s==='5') return '<span class="badge badge-done">Tamamlandı</span>';
  if(dl && dl < now && s!=='5') return '<span class="badge badge-expired">Gecikmiş</span>';
  if(s==='3') return '<span class="badge badge-progress">Devam Ediyor</span>';
  if(s==='2') return '<span class="badge badge-new">Bekliyor</span>';
  return '<span class="badge badge-new">'+(s||'—')+'</span>';
}

function showView(v) {
  document.getElementById('view-tasks').style.display = v==='tasks' ? '' : 'none';
  document.getElementById('view-perf').style.display  = v==='perf'  ? '' : 'none';
  document.getElementById('page-title').textContent = v==='tasks' ? 'Görevler' : 'Çalışan Bazında';
  document.getElementById('search-wrap').style.display = v==='tasks' ? '' : 'none';
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active', (v==='tasks'&&i===0)||(v==='perf'&&i===1));
  });
}

function setFilter(f,btn){
  currentFilter=f; currentPage=1;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

function filterTasks(){ currentPage=1; renderTasks(); }

function isExpired(t) {
  if(t.STATUS==='5') return false;
  return t.DEADLINE && new Date(t.DEADLINE) < new Date();
}

function getFiltered(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  return allTasks.filter(t=>{
    let mf = false;
    if(currentFilter==='ALL') mf=true;
    else if(currentFilter==='EXPIRED') mf=isExpired(t);
    else mf=(t.STATUS===currentFilter);
    const mq = !q || (t.TITLE||'').toLowerCase().includes(q) || (userMap[t.RESPONSIBLE_ID]||'').toLowerCase().includes(q);
    return mf&&mq;
  });
}

function renderTasks(){
  const filtered = getFiltered();
  const total = filtered.length;
  const pages = Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>pages) currentPage=1;
  const slice = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  document.getElementById('task-count').textContent = total;

  if(!slice.length){
    document.getElementById('tasks-table').innerHTML='<div class="state-box"><p>Görev bulunamadı.</p></div>';
    document.getElementById('pagination').style.display='none';
    return;
  }

  let html='<table><thead><tr><th>Görev</th><th>Sorumlu</th><th>Durum</th><th>Son Tarih</th><th>Grup</th><th></th></tr></thead><tbody>';
  for(const t of slice){
    const resp = userMap[t.RESPONSIBLE_ID] || 'Kullanıcı #'+t.RESPONSIBLE_ID;
    const dl = t.DEADLINE ? t.DEADLINE.slice(0,10) : '—';
    const url = PORTAL+'/company/personal/user/'+t.RESPONSIBLE_ID+'/tasks/task/view/'+t.ID+'/';
    const expired = isExpired(t);
    html+=`<tr class="clickable" onclick="window.open('${url}','_blank')">
      <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;">${t.TITLE||'—'}</td>
      <td><div class="name-cell"><span class="avatar">${initials(resp)}</span><span style="font-size:13px;">${resp}</span></div></td>
      <td>${statusBadge(t.STATUS, t.DEADLINE)}</td>
      <td style="font-family:var(--mono);font-size:12px;color:${expired?'var(--red)':'var(--text3)'};">${dl}</td>
      <td style="font-size:12px;color:var(--text2);">${t.GROUP_ID ? 'Grup #'+t.GROUP_ID : '—'}</td>
      <td><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:13px;height:13px;color:var(--text3);opacity:0.5;"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></td>
    </tr>`;
  }
  html+='</tbody></table>';
  document.getElementById('tasks-table').innerHTML=html;

  const pag=document.getElementById('pagination');
  if(pages>1){
    pag.style.display='flex';
    document.getElementById('page-info').textContent=`${(currentPage-1)*PAGE_SIZE+1}–${Math.min(currentPage*PAGE_SIZE,total)} / ${total}`;
    let btns='';
    const start=Math.max(1,currentPage-3), end=Math.min(pages,start+6);
    if(start>1) btns+=`<button class="page-btn" onclick="goPage(1)">1</button>`;
    for(let i=start;i<=end;i++) btns+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    if(end<pages) btns+=`<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
    document.getElementById('page-btns').innerHTML=btns;
  } else { pag.style.display='none'; }
}

function goPage(p){ currentPage=p; renderTasks(); }

function renderPerf(){
  const pm={};
  for(const t of allTasks){
    const uid=t.RESPONSIBLE_ID; if(!uid) continue;
    if(!pm[uid]) pm[uid]={name:userMap[uid]||'#'+uid,total:0,waiting:0,progress:0,done:0,expired:0};
    pm[uid].total++;
    if(t.STATUS==='5') pm[uid].done++;
    else if(isExpired(t)) pm[uid].expired++;
    else if(t.STATUS==='3') pm[uid].progress++;
    else pm[uid].waiting++;
  }
  const rows=Object.values(pm).sort((a,b)=>b.total-a.total);
  const max=rows[0]?.total||1;

  let html='<table><thead><tr><th>Çalışan</th><th>Toplam</th><th>Bekliyor</th><th>Devam</th><th>Tamamlandı</th><th>Gecikmiş</th><th>Dağılım</th></tr></thead><tbody>';
  for(const u of rows){
    const bw=Math.round(u.total/max*100);
    html+=`<tr class="clickable" onclick="filterByUser('${Object.keys(pm).find(k=>pm[k]===u)}','${u.name.replace(/'/g,'')}')">
      <td><div class="name-cell"><span class="avatar">${initials(u.name)}</span><span style="font-size:13px;">${u.name}</span></div></td>
      <td style="font-family:var(--mono);font-weight:600;">${u.total}</td>
      <td style="color:var(--amber);font-family:var(--mono);">${u.waiting}</td>
      <td style="color:var(--green);font-family:var(--mono);">${u.progress}</td>
      <td style="color:var(--purple);font-family:var(--mono);">${u.done}</td>
      <td style="color:var(--red);font-family:var(--mono);">${u.expired}</td>
      <td><div class="perf-bar"><div class="perf-bar-track"><div class="perf-bar-fill" style="width:${bw}%"></div></div></div></td>
    </tr>`;
  }
  html+='</tbody></table>';
  document.getElementById('perf-table').innerHTML=html;
}

function filterByUser(uid, name){
  showView('tasks');
  document.getElementById('page-title').textContent = name+' — Görevler';
  currentFilter='ALL'; currentPage=1;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-tab').classList.add('active');
  const prev=allTasks;
  allTasks=allTasks.filter(t=>t.RESPONSIBLE_ID==uid);
  renderTasks();
  allTasks=prev;
  const backBtn=document.createElement('button');
  backBtn.className='btn'; backBtn.style.marginBottom='12px';
  backBtn.innerHTML='← Tüm Görevler';
  backBtn.onclick=()=>{ document.getElementById('page-title').textContent='Görevler'; currentFilter='ALL'; currentPage=1; document.querySelector('.filter-tab').classList.add('active'); renderTasks(); backBtn.remove(); };
  document.getElementById('tasks-table').insertAdjacentElement('beforebegin',backBtn);
}

async function loadData(){
  document.getElementById('tasks-table').innerHTML='<div class="state-box loading-anim"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><p>Yükleniyor...</p></div>';
  document.getElementById('perf-table').innerHTML='<div class="state-box loading-anim"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><p>Yükleniyor...</p></div>';

  try {
    const [tasks, users] = await Promise.all([
      fetchAll('tasks.task.list', {
        select: ['ID','TITLE','STATUS','RESPONSIBLE_ID','DEADLINE','GROUP_ID','CREATED_DATE'],
        order: {'CREATED_DATE': 'DESC'}
      }),
      bxCall('user.get', {ACTIVE:'Y'})
    ]);

    userMap={};
    for(const u of users.result) userMap[u.ID]=[u.NAME,u.LAST_NAME].filter(Boolean).join(' ');

    allTasks=tasks;

    let total=tasks.length, waiting=0, progress=0, done=0, expired=0;
    for(const t of tasks){
      if(t.STATUS==='5') done++;
      else if(isExpired(t)) expired++;
      else if(t.STATUS==='3') progress++;
      else waiting++;
    }
    document.getElementById('m-total').textContent=total.toLocaleString('tr');
    document.getElementById('m-new').textContent=waiting.toLocaleString('tr');
    document.getElementById('m-progress').textContent=progress.toLocaleString('tr');
    document.getElementById('m-done').textContent=done.toLocaleString('tr');
    document.getElementById('m-expired').textContent=expired.toLocaleString('tr');

    renderTasks();
    renderPerf();
  } catch(e) {
    document.getElementById('tasks-table').innerHTML=`<div class="state-box"><p class="state-error">Hata: ${e.message}</p></div>`;
  }
}

loadData();
</script>
</body>
</html>
